<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <span class="eyebrow">Analytics</span>
        <h1>Sales Dashboard</h1>
      </div>
      <div class="summary-panel">
        <div>
          <strong>$1.24M</strong>
          <span>Total Revenue</span>
        </div>
        <div>
          <strong>18.4%</strong>
          <span>MoM Growth</span>
        </div>
        <div>
          <strong>4.2k</strong>
          <span>Units Sold</span>
        </div>
      </div>
    </header>

    <main class="dashboard-grid">
      <section class="card">
        <h2>Revenue Trend</h2>
        <canvas id="revenueTrend"></canvas>
      </section>

      <section class="card">
        <h2>Sales by Region</h2>
        <canvas id="salesRegion"></canvas>
      </section>

      <section class="card">
        <h2>Product Category Share</h2>
        <canvas id="categoryShare"></canvas>
      </section>

      <section class="card">
        <h2>Quarterly Targets</h2>
        <canvas id="quarterlyTargets"></canvas>
      </section>

      <section class="card full-width">
        <h2>Customer Engagement</h2>
        <canvas id="customerEngagement"></canvas>
      </section>
    </main>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
